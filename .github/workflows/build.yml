name: Build APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches/build-cache-1/ ~/.gradle/caches/transforms-4/

      - name: Update dependency locks
        run: ./gradlew :app:dependencies --write-locks --no-configuration-cache

      - name: Build Full Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleFullDebug --stacktrace --no-configuration-cache
        env:
          SENTRY_DSN: ""

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ha-android-full-debug
          path: app/build/outputs/apk/full/debug/*.apk
          retention-days: 30
